# JISR configuration — single source of truth for the pipeline.

project:
  name: JISR
  languages: [en, ar]

ingestion:
  input_dir: data/raw
  output_dir: data/processed
  ocr:
    engine: tesseract          # tesseract | surya
    languages: "eng+ara"
    dpi: 300
    # Project-local tessdata (best-quality eng/ara models) since Program Files
    # needs admin. Sets TESSDATA_PREFIX at runtime. Repo-relative path.
    tessdata_dir: tessdata
    # Poppler bin for pdf2image. Empty => rely on PATH (winget adds a shim).
    # Override here or via the POPPLER_PATH env var if needed.
    poppler_path: ""
  chunking:
    strategy: layout           # layout-aware chunking
    chunk_size: 800
    chunk_overlap: 120

embeddings:
  model: BAAI/bge-m3           # multilingual dense + sparse
  device: cuda
  normalize: true
  reranker: BAAI/bge-reranker-v2-m3   # optional, boosts context precision

vector_store:
  backend: pgvector            # pgvector (primary) | chroma
  pgvector:
    host: localhost
    port: 5433                 # Docker pgvector container (native PG17 holds 5432)
    dbname: jisr
    user: postgres
    password: ${PG_PASSWORD}   # set in env
    # Separate collections per language enable the cross-lingual router
    tables:
      en: chunks_en
      ar: chunks_ar
  hybrid:
    dense_weight: 0.6
    sparse_weight: 0.4
    top_k: 8

inference:
  backend: ollama              # ollama | llama_cpp
  models:
    # Arabic-centric. The ORIGINAL jais-13b uses a custom GPT-3/ALiBi architecture
    # that llama.cpp/Ollama don't support; the inceptionai "jais-adapted-13b" family
    # is Llama-2-based and runs natively. Pulled from HF as a single Q4_K_M GGUF (8.09 GB),
    # then wrapped with the official Jais chat template via models/Modelfile.jais
    # (build: `ollama create jais-chat -f models/Modelfile.jais`).
    ar: jais-chat
    en: llama3:8b              # English (official Ollama, ~4.7 GB Q4)
  # The Critic/reflection node uses ONE model for both languages: Llama-3 follows
  # instructions and reads Arabic reliably, whereas Jais is an inconsistent judge.
  # User-facing generation still routes by language (Jais for AR). Trade-off: an
  # Arabic query swaps Llama-3 (critic) -> Jais (generate) in VRAM.
  critic_model: llama3:8b
  quantization: q4_K_M         # INT4 GGUF — fits 12 GB VRAM (RTX 5070)
  max_vram_gb: 12
  context_window: 4096
  temperature: 0.1
  # Ollama loads one model at a time on demand, so only the routed model is resident:
  # 8.09 GB (Jais) or ~4.7 GB (Llama-3) — both fit the 12 GB card with context headroom.

agent:
  max_reflection_loops: 2      # Critic can re-retrieve up to N times
  relevance_threshold: 0.7     # below this, Critic forces a re-retrieve/rewrite
  router: semantic             # semantic intent-based EN/AR routing

eval:
  golden_set: data/golden/sample_golden.jsonl
  metrics: [faithfulness, answer_relevancy, context_precision, context_recall]
  baselines: [naive, agentic]
  results_dir: results
